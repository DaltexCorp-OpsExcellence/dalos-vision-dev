<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DalOS Vision</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede6;--bg2:#e8e4da;--bg3:#ddd8cc;
  --sidebar:#1e2d22;--sidebar2:#263529;
  --sidebar-text:#c8d4c0;--sidebar-muted:#6a8068;
  --accent:#2b5c3f;--accent2:#4a8c62;
  --amber:#b87820;--amber-bg:#fdf3e0;--amber-border:#e8c87a;
  --red:#b03030;--red-bg:#faeaea;--red-border:#e8a0a0;
  --green:#1e6b3a;--green-bg:#e8f5ec;--green-border:#8ecba4;
  --text:#1a1a17;--text2:#4a4840;--text3:#7a7668;
  --border:#d0cbbe;--border2:#bcb8ae;--card:#ffffff;
  --font-display:'DM Serif Display',serif;
  --font-body:'Instrument Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --r:8px;--r2:12px;
  --sidebar-w:218px;
}
html,body,#root{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font-body);font-size:13px;color:var(--text)}

/* LANDING */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0 24px;overflow-y:auto}
.landing-logo{font-family:var(--font-display);font-size:32px;color:var(--text)}
.landing-sub{font-size:12px;color:var(--text3);margin-top:5px;letter-spacing:.06em;text-transform:uppercase}
.landing-prompt{font-size:15px;color:var(--text2);margin-top:30px;margin-bottom:32px}
.crop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,200px));gap:14px;justify-content:center}
.crop-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 16px 16px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s}
.crop-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.09);border-color:var(--border2)}
.crop-icon-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.crop-name{font-family:var(--font-display);font-size:18px;color:var(--text);margin-bottom:4px}
.crop-vars{font-size:11px;color:var(--text3);line-height:1.6;margin-bottom:12px}
.crop-stat{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.crop-stat-label{color:var(--text3)}
.crop-stat-val{font-family:var(--font-mono);color:var(--text2);font-weight:500}
@media(max-width:767px){
  .crop-card{padding:12px 10px 12px!important;border-radius:10px!important}
  .crop-icon-wrap{width:36px;height:36px;border-radius:8px;margin-bottom:8px}
  .crop-name{font-size:15px!important;margin-bottom:3px}
  .crop-vars{font-size:10px;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
}

/* APP LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:transform .2s}
.sidebar-logo{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-mark{font-family:var(--font-display);font-size:19px;color:#fff}
.sidebar-logo-crop{font-size:10px;color:var(--sidebar-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;display:flex;align-items:center;gap:5px}
.sidebar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-sec{padding:16px 12px 5px;font-size:10px;color:var(--sidebar-muted);letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:6px;margin:1px 8px;color:var(--sidebar-text);font-size:13px;cursor:pointer;transition:background .15s,color .15s}
.nav-item:hover{background:var(--sidebar2);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;font-weight:500}
.nav-icon{width:14px;height:14px;flex-shrink:0;opacity:.65}
.nav-item.active .nav-icon{opacity:1}
.sidebar-bottom{margin-top:auto;padding:10px 8px;border-top:1px solid rgba(255,255,255,.06)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-shrink:0;gap:8px}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.topbar-title{font-family:var(--font-display);font-size:17px;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.page{padding:16px;flex:1}

/* MOBILE BOTTOM NAV (hidden on desktop) */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--sidebar);border-top:1px solid rgba(255,255,255,.1);z-index:50;flex-direction:row;align-items:stretch;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mobile-nav::-webkit-scrollbar{display:none}
.mobile-nav-item{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--sidebar-muted);font-size:10px;cursor:pointer;padding:6px 4px;transition:color .15s;flex-shrink:0}
.mobile-nav-item.active{color:#fff}
.mobile-nav-item svg{width:18px;height:18px;opacity:.7}
.mobile-nav-item.active svg{opacity:1}
/* hamburger toggle for mobile sidebar */
.menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--sidebar);cursor:pointer;flex-shrink:0}
.menu-btn svg{width:18px;height:18px;fill:#fff}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}

/* COMPONENTS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.section-title{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.section-title-bar{height:2px;width:20px;border-radius:1px;flex-shrink:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.kpi-value{font-family:var(--font-display);font-size:26px;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-sub.up{color:var(--green)}.kpi-sub.down{color:var(--red)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-pass{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-fail{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-hold{background:#fff3e0;color:#b06010;border:1px solid #e8c090}
.badge-escalated{background:#e8eeff;color:#2a50c0;border:1px solid #a0b4e8;font-weight:600}
.badge-special-accept{background:#f0e8ff;color:#6a10b0;border:1px solid #c090e0;font-weight:600}
.badge-special-reject{background:#fff0e8;color:#b04010;border:1px solid #e0b090;font-weight:600}
.badge-neutral{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:600px}
th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);padding:7px 10px;border-bottom:2px solid var(--border2);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.click{cursor:pointer}
tr.click:hover td{background:var(--bg)}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 14px;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--card);color:var(--text2);border-color:var(--border2)}
.btn-secondary:hover{background:var(--bg2)}
.btn-sm{padding:4px 10px;font-size:12px}
.scroll-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:visible}.scroll-card .table-wrap{overflow-x:auto;overflow-y:visible;border-radius:var(--r2)}
.scroll-card .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.lot{font-family:var(--font-mono);font-size:11px;background:var(--bg2);padding:2px 6px;border-radius:4px;color:var(--text2)}
.sep{height:1px;background:var(--border);margin:12px 0}
.alert-warn{background:#fff3e0;border:1px solid #e8c090;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#7a4a10}
.alert-fail{background:var(--red-bg);border:1px solid var(--red-border);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--red)}
.dp{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.dp-hdr{background:var(--bg2);padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
/* Mobile bottom sheet */
@media(max-width:700px){
  .dp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;flex-direction:column;justify-content:flex-end;touch-action:none}
  .dp-sheet{background:var(--card);border-radius:20px 20px 0 0;max-height:82vh;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.32,.72,0,1);transform:translateY(0)}
  .dp-handle-wrap{padding:10px 0 4px;display:flex;justify-content:center;cursor:grab;flex-shrink:0}
  .dp-handle{width:36px;height:4px;background:var(--border2);border-radius:2px}
  .dp-sheet .dp-hdr{border-radius:0;flex-shrink:0}
  .dp-sheet .dp-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:none}
  .dp-sheet-actions{padding:12px 16px 28px;border-top:1px solid var(--border);background:var(--card);flex-shrink:0;display:flex;gap:8px}
}
.dp-body{padding:14px;font-size:13px;max-height:calc(100vh - 120px);overflow-y:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}

/* INSPECTION FORM */
.form-field{margin-bottom:10px}
.form-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--card);outline:none;transition:border-color .15s;font-size:14px;color:var(--text)}
.form-input:focus{border-color:var(--accent)}
.form-select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--card);outline:none;font-size:14px;color:var(--text)}
.defect-section{margin-bottom:16px}
.defect-section-header{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border-radius:5px;margin-bottom:8px}
.defect-row{display:grid;grid-template-columns:1fr 90px 55px 60px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.defect-row:last-child{border-bottom:none}
.defect-input{width:100%;padding:4px 7px;border:1px solid var(--border2);border-radius:4px;background:var(--card);font-family:var(--font-mono);font-size:12px;text-align:right;outline:none}
.defect-input:focus{border-color:var(--accent)}
.defect-input.over{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.defect-thresh{font-size:10px;color:var(--text3);text-align:right}
.total-row{display:grid;grid-template-columns:1fr 90px 55px 60px;gap:6px;align-items:center;padding:8px 10px;background:var(--bg2);border-radius:6px;margin-top:8px}
.total-label{font-size:12px;font-weight:600;color:var(--text)}
.total-val{font-family:var(--font-mono);font-size:14px;font-weight:600;text-align:right}
.clearance-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.clearance-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:6px;font-size:11px}
.clearance-label{color:var(--text2);flex:1;margin-right:8px}
.toggle-wrap{display:flex;gap:4px}
.toggle-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text3);transition:all .12s}
.toggle-btn.active-comply{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.toggle-btn.active-non{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.decision-bar{display:flex;gap:8px;margin-top:14px}
.decision-btn{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;text-align:center}
.decision-a{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.decision-a:hover,.decision-a.sel{background:var(--green);color:#fff;border-color:var(--green)}
.decision-r{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.decision-r:hover,.decision-r.sel{background:var(--red);color:#fff;border-color:var(--red)}
.wax-options{display:flex;gap:6px;flex-wrap:nowrap}
.wax-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text3);transition:all .12s}
.wax-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.currency-wrap{display:flex;gap:6px;align-items:center}
.currency-select{width:76px;flex-shrink:0;padding:8px 6px;border:1px solid var(--border2);border-radius:6px;background:var(--card);outline:none;font-size:13px;color:var(--text)}
.currency-select:focus{border-color:var(--accent)}

/* ── RESPONSIVE BREAKPOINTS ── */

/* Tablet: 768px–1024px */
@media(max-width:1024px){
  :root{--sidebar-w:190px}
  .page{padding:14px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid4{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .topbar-title{font-size:15px}
  .kpi-value{font-size:22px}
}

/* Mobile: up to 767px */
@media(max-width:767px){
  /* Sidebar becomes slide-in drawer */
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:41;transform:translateX(-100%);width:240px!important;min-width:0!important}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .mobile-nav{display:none!important}
  .menu-btn{display:flex}
  /* No bottom nav — no bottom padding needed */
  .layout{flex-direction:column;height:auto;min-height:100vh}
  .main{padding-bottom:0}
  /* Page padding */
  .page{padding:12px}
  /* Topbar */
  .topbar{padding:0 12px;height:48px}
  .topbar-title{font-size:15px}
  /* KPIs — 2 columns on mobile */
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .kpi{padding:10px 12px}
  .kpi-value{font-size:20px}
  .kpi-sub{font-size:10px}
  /* Grids — single column */
  .grid4{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  /* Cards */
  .card{padding:12px}
  /* Detail panel — full width */
  .dp{margin-top:12px}
  .dp-body{max-height:none}
  /* Clearance grid */
  .clearance-grid{grid-template-columns:1fr}
  .clearance-item{flex-wrap:wrap;gap:6px}
  /* Decision bar */
  .decision-bar{flex-direction:column}
  /* Tabs scroll */
  .tabs{overflow-x:auto}
  .tab{padding:6px 12px;font-size:12px}
  /* Buttons */
  .btn{padding:8px 12px;font-size:13px}
  .btn-sm{padding:6px 10px;font-size:12px}
  /* Landing packhouses */
  .ph-grid{grid-template-columns:1fr!important}
  /* Sample rows — horizontal scroll */
  .sample-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
}

/* Very small phones */
@media(max-width:380px){
  .kpi-grid{grid-template-columns:1fr}
  .topbar-title{font-size:14px}
}

/* ── MOBILE — INSPECTION FORM & GLOBAL ── */

/* Prevent iOS font zoom on inputs — must be 16px */
input,select,textarea{font-size:16px!important}
@media(min-width:768px){
  input,select,textarea{font-size:14px!important}
  .form-input{font-size:14px!important}
  .form-select{font-size:14px!important}
}

@media(max-width:767px){
  /* ── Sidebar — scrollable, sidebar-bottom always visible ── */
  .sidebar{overflow-y:auto!important;display:flex!important;flex-direction:column!important}
  .sidebar-bottom{flex-shrink:0}

  /* ── Form topbar — two clean rows ── */
  .sticker-grid{grid-template-columns:1fr!important}
  .topbar-badge{display:none}
  .form-topbar{flex-wrap:nowrap!important;height:auto!important;padding:8px 10px!important;gap:6px;align-items:center!important}
  .form-topbar-left-group{flex:1;min-width:0;display:flex;align-items:center;gap:6px;overflow:hidden}
  .form-topbar-title{font-size:14px!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .form-topbar-right{flex-shrink:0;display:flex!important;align-items:center;gap:6px}
  .form-topbar-right .btn-primary{min-height:38px;padding:6px 14px!important;font-size:13px!important}
  .form-topbar-avg{font-size:13px!important;font-weight:700;white-space:nowrap}
  .form-topbar-newpallet{display:none!important}
  .inspection-page{padding:10px 8px!important}

  /* ── Form inputs — bigger tap targets ── */
  .form-input{padding:11px 12px!important;font-size:16px!important;min-height:44px}
  .form-select{padding:11px 12px!important;font-size:16px!important;min-height:44px}
  .form-label{font-size:11px!important;margin-bottom:5px}

  /* ── Wax buttons ── */
  .wax-btn{padding:10px 12px!important;font-size:13px!important;min-height:44px;flex-shrink:0}
  .wax-options{flex-wrap:nowrap!important;gap:6px!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;padding-bottom:2px}

  /* ── Decision buttons ── */
  .decision-btn{padding:16px 12px!important;font-size:15px!important}

  /* ── Toggle / clearance buttons ── */
  .toggle-btn{padding:10px 14px!important;font-size:13px!important;min-height:40px}
  .clearance-item{flex-direction:column!important;align-items:flex-start!important;gap:8px!important;padding:10px 12px!important}
  .clearance-btns{display:flex;gap:8px;width:100%}
  .clearance-btns .toggle-btn{flex:1;text-align:center}

  /* ── Pallet header ── */
  .pallet-header-actions{flex-wrap:wrap;gap:6px}
  .clearance-grid{grid-template-columns:1fr!important}

  /* ── Sample cards vs table ── */
  .sample-table-desktop{display:none!important}
  .sample-card-mobile{display:block!important}

  /* ── Defect expanded grid — single column on phones, 2 col on tablet ── */
  .defect-expand-grid{grid-template-columns:1fr!important}
  .defect-name-cell{min-width:0;overflow:hidden}
  .defect-name-cell .defect-en{font-size:11px!important;line-height:1.3;white-space:normal;word-break:break-word}
  .defect-row-input{width:56px!important;padding:5px 4px!important;font-size:14px!important;min-height:38px}

  /* ── Cards ── */
  .card{padding:12px!important}
  .section-title{font-size:12px}

  /* ── Buttons ── */
  .btn{min-height:40px}

/* ─── TYPEAHEAD COMPONENT ─── */
function Typeahead(props){
  var value=props.value||'';
  var onChange=props.onChange||function(){};
  var options=props.options||[]; /* array of strings or {name,hint} objects */
  var placeholder=props.placeholder||'Type to search...';
  var minChars=props.minChars||2;
  var disabled=props.disabled||false;

  var sQ=useState(value?value:''); var q=sQ[0]; var setQ=sQ[1];
  var sOpen=useState(false); var open=sOpen[0]; var setOpen=sOpen[1];
  var sActive=useState(-1); var activeIdx=sActive[0]; var setActiveIdx=sActive[1];

  /* Sync external value changes */
  React.useEffect(function(){setQ(value||'');},[value]);

  var filtered=q.length>=minChars?(options.filter(function(o){
    var n=typeof o==='string'?o:o.name;
    return n.toLowerCase().indexOf(q.toLowerCase())>=0;
  })):[];

  function selectOption(opt){
    var n=typeof opt==='string'?opt:opt.name;
    setQ(n);setOpen(false);setActiveIdx(-1);onChange(n);
  }

  function handleKey(e){
    if(!open) return;
    if(e.key==='ArrowDown'){setActiveIdx(function(i){return Math.min(i+1,filtered.length-1);});e.preventDefault();}
    if(e.key==='ArrowUp'){setActiveIdx(function(i){return Math.max(i-1,0);});e.preventDefault();}
    if(e.key==='Enter'&&activeIdx>=0&&filtered[activeIdx]){selectOption(filtered[activeIdx]);e.preventDefault();}
    if(e.key==='Escape'){setOpen(false);}
  }

  function highlight(text){
    if(!q||q.length<minChars) return text;
    var idx=text.toLowerCase().indexOf(q.toLowerCase());
    if(idx===-1) return text;
    return ce('span',null,
      text.slice(0,idx),
      ce('strong',{style:{color:'var(--accent)'}},text.slice(idx,idx+q.length)),
      text.slice(idx+q.length)
    );
  }

  return ce('div',{style:{position:'relative'}},
    ce('input',{
      className:'form-input',
      value:q,
      disabled:disabled,
      placeholder:placeholder,
      autoComplete:'off',
      onChange:function(e){
        setQ(e.target.value);
        setOpen(true);
        setActiveIdx(-1);
        if(!e.target.value) onChange('');
      },
      onFocus:function(){if(q.length>=minChars) setOpen(true);},
      onBlur:function(){setTimeout(function(){setOpen(false);},180);},
      onKeyDown:handleKey
    }),
    open&&filtered.length>0&&ce('div',{style:{
      position:'absolute',top:'calc(100% + 3px)',left:0,right:0,zIndex:999,
      background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,
      boxShadow:'0 4px 16px rgba(0,0,0,.1)',overflow:'hidden',maxHeight:220,overflowY:'auto'
    }},
      filtered.map(function(opt,i){
        var n=typeof opt==='string'?opt:opt.name;
        var hint=typeof opt==='object'&&opt.hint?opt.hint:null;
        return ce('div',{
          key:n,
          style:{
            padding:'8px 12px',cursor:'pointer',fontSize:13,
            background:i===activeIdx?'var(--bg2)':'transparent',
            borderBottom:i<filtered.length-1?'1px solid var(--border2)':'none'
          },
          onMouseDown:function(e){e.preventDefault();selectOption(opt);}
        },
          ce('div',{style:{fontWeight:500,color:'var(--text)'}},highlight(n)),
          hint&&ce('div',{style:{fontSize:11,color:'var(--text3)',marginTop:1}},hint)
        );
      })
    ),
    open&&q.length>=minChars&&filtered.length===0&&ce('div',{style:{
      position:'absolute',top:'calc(100% + 3px)',left:0,right:0,zIndex:999,
      background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,
      padding:'10px 12px',fontSize:13,color:'var(--text3)',fontStyle:'italic'
    }},'No results for "'+q+'"')
  );
}

function ExportView(props){
  var phId = props.phId||'';
  var config = props.config||INITIAL_CONFIG;

  /* filter state */
  var sd1=useState('2026-03-01'); var dateFrom=sd1[0]; var setDateFrom=sd1[1];
  var sd2=useState('2026-03-31'); var dateTo=sd2[0]; var setDateTo=sd2[1];
  var sph=useState('All'); var fPh=sph[0]; var setFPh=sph[1];
  var scp=useState('All'); var fCrop=scp[0]; var setFCrop=scp[1];
  var svr=useState('All'); var fVar=svr[0]; var setFVar=svr[1];
  var sdec=useState('All'); var fDec=sdec[0]; var setFDec=sdec[1];
  var scli=useState('All'); var fClient=scli[0]; var setFClient=scli[1];
  var sfm=useState('All'); var fFarm=sfm[0]; var setFFarm=sfm[1];
  var sst=useState('All'); var fStatus=sst[0]; var setFStatus=sst[1];
  var sSeason=useState('All'); var fSeason=sSeason[0]; var setFSeason=sSeason[1];
  var scr=useState('All'); var fCR=scr[0]; var setFCR=scr[1];
  var sformat=useState('csv'); var fmt=sformat[0]; var setFmt=sformat[1];

  /* derived unique values */
  var allPh=['All'].concat(PACKHOUSES.map(function(p){return p.id;}));
  var allCrops=['All','Citrus','Mango','Pomegranate','Grapes'];
  var allVars=['All'].concat(Array.from(new Set(ALL_EXPORT_ROWS.map(function(r){return r.variety;}))).sort());
  var allClients=['All'].concat(Array.from(new Set(ALL_EXPORT_ROWS.map(function(r){return r.client;}))).sort());
  var allFarms=['All'].concat(Array.from(new Set(ALL_EXPORT_ROWS.map(function(r){return r.farm;}))).sort());

  /* filter logic */
  var filtered = ALL_EXPORT_ROWS.filter(function(r){
    if(r.date < dateFrom || r.date > dateTo) return false;
    if(fPh!=='All' && r.packhouse!==fPh) return false;
    if(fCrop!=='All' && r.crop!==fCrop) return false;
    if(fVar!=='All' && r.variety!==fVar) return false;
    if(fDec!=='All' && r.decision!==fDec) return false;
    if(fClient!=='All' && r.client!==fClient) return false;
    if(fFarm!=='All' && r.farm!==fFarm) return false;
    if(fStatus!=='All' && r.status!==fStatus) return false;
    if(fSeason!=='All' && r.season!==fSeason) return false;
    if(fCR==='With report' && !r.hasClientReport) return false;
    if(fCR==='No report' && r.hasClientReport) return false;
    if(fCR==='With claim' && !r.claimedValue) return false;
    return true;
  });

  /* summary stats from filtered set */
  var totalRows=filtered.length;
  var acceptCount=filtered.filter(function(r){return r.decision==='A';}).length;
  var rejectCount=filtered.filter(function(r){return r.decision==='R';}).length;
  var avgDef=totalRows>0?Math.round(filtered.reduce(function(s,r){return s+r.totalDefect;},0)/totalRows*10)/10:0;
  var totalClaim=filtered.reduce(function(s,r){return s+(r.claimedValue||0);},0);
  var missingCont=filtered.filter(function(r){return !r.container;}).length;

  /* CSV builder */
  function buildCSV(){
    var header=EXPORT_COLS.join(',');
    var rows=filtered.map(function(r){
      return EXPORT_COLS.map(function(k){
        var v=r[k];
        if(v===null||v===undefined) return '';
        if(typeof v==='string'&&v.indexOf(',')>-1) return '"'+v+'"';
        return v;
      }).join(',');
    });
    return [header].concat(rows).join('\n');
  }

  function downloadCSV(){
    var csv=buildCSV();
    var blob=new Blob([csv],{type:'text/csv'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='daltex_qc_export_'+dateFrom+'_to_'+dateTo+'.csv';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

    setDateFrom('2026-03-01'); setDateTo('2026-03-31');
    setFPh('All'); setFCrop('All'); setFVar('All');
    setFDec('All'); setFClient('All'); setFFarm('All');
    setFStatus('All'); setFCR('All');
  }

      ce('label',{className:'form-label'},label),
      ce('select',{className:'form-select',value:val,onChange:function(e){setter(e.target.value);}},
        opts.map(function(o){return ce('option',{key:o,value:o},o);})
      )
    );
  };

  return ce('div',null,

    /* ── summary KPIs ── */

        ce('div',{className:'kpi-label'},'Rows selected'),

        ce('div',{style:{display:'flex',alignItems:'baseline',gap:6}},

          ce('span',{style:{fontSize:14,color:'var(--text3)'}},' / '),
          ce('div',{className:'kpi-value',style:{color:'var(--red)',fontSize:22}},rejectCount)
        ),
        ce('div',{className:'kpi-sub'},'Avg defect: '+avgDef+'%')
      ),
      ce('div',{className:'kpi'},
        ce('div',{className:'kpi-label'},'Total claimed value'),
        ce('div',{className:'kpi-value',style:{color:totalClaim>0?'var(--red)':'var(--text)',fontSize:totalClaim>0?20:28}},totalClaim>0?totalClaim.toLocaleString():'—'),
        ce('div',{className:'kpi-sub'},filtered.filter(function(r){return r.claimedValue>0;}).length+' batches with claims')
      ),
      ce('div',{className:'kpi'},
        ce('div',{className:'kpi-label'},'Missing container No'),
        ce('div',{className:'kpi-value',style:{color:missingCont>0?'var(--amber)':'var(--text)'}},missingCont),
        ce('div',{className:'kpi-sub',style:{color:missingCont>0?'var(--amber)':'var(--text3)'}},missingCont>0?'Will export blank':'All assigned')
      )
    ),

    ce('div',{style:{display:'grid',gridTemplateColumns:'280px 1fr',gap:16,alignItems:'start'}},

      /* ── FILTERS PANEL ── */
      ce('div',{className:'card',style:{position:'sticky',top:16}},
        ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
          ce('div',{className:'section-title',style:{marginBottom:0}},
            ce('div',{className:'section-title-bar',style:{background:'#2b5c3f'}}),
            'Filters'
          ),
          ce('button',{className:'btn btn-secondary btn-sm',onClick:resetFilters},'Reset')
        ),

        /* Date range */
        ce('div',{style:{marginBottom:12}},
          ce('label',{className:'form-label'},'Date range'),
          ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}},
            ce('input',{className:'form-input',type:'date',value:dateFrom,onChange:function(e){setDateFrom(e.target.value);}}),
            ce('input',{className:'form-input',type:'date',value:dateTo,onChange:function(e){setDateTo(e.target.value);}})
          )
        ),

        filterLabel('Packhouse',fPh,setFPh,allPh),
        filterLabel('Crop',fCrop,setFCrop,allCrops),
        filterLabel('Variety',fVar,setFVar,allVars),
        filterLabel('Decision',fDec,setFDec,['All','A — Accept','R — Reject']),
        filterLabel('Status',fStatus,setFStatus,['All','Accepted','Rejected','Pending','Escalated']),
        ce('div',{className:'form-field'},
          ce('label',{className:'form-label'},'Season'),
          ce('select',{className:'form-select',value:fSeason,onChange:function(e){setFSeason(e.target.value);}},

          )
        ),
        filterLabel('Client',fClient,setFClient,allClients),

        filterLabel('Client QC report',fCR,setFCR,['All','With report','No report','With claim']),

                style:{flex:1,fontSize:11,background:fmt===val?'var(--accent)':'var(--card)',color:fmt===val?'#fff':disabled?'var(--text3)':'var(--text2)',border:'1px solid '+(fmt===val?'var(--accent)':disabled?'var(--border)':'var(--border2)'),cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1},
                onClick:function(){if(!disabled) setFmt(val);}
              },f);
            })

        ce('button',{

  /* OCR a single file via Claude API */
  function ocrFile(file, idx, total, onDone){
    var reader=new FileReader();
    reader.onload=function(ev){
      var b64=ev.target.result.split(',')[1];
      var mediaType=file.type||'image/jpeg';
      // For PDFs use document type, images use image type
      var contentBlock=mediaType==='application/pdf'
        ?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}
        :{type:'image',source:{type:'base64',media_type:mediaType,data:b64}};
      fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1500,
          messages:[{role:'user',content:[
            contentBlock,
            {type:'text',text:'This is a client QC intake/inspection report for citrus from Egypt (Daltex). Extract all available data and respond ONLY with a valid JSON object (no markdown, no explanation):\n{\n  "container": "container number e.g. MNBU3564353",\n  "qcReportNumber": "report/PO/batch reference number",\n  "client": "client company name",\n  "subClient": "retailer if mentioned e.g. Lidl, Tesco, Waitrose",\n  "variety": "citrus variety",\n  "lot": "lot number",\n  "traceCode": "traceability code",\n  "ggn": "GGN number",\n  "packhouse": "packhouse name",\n  "inspectionDate": "date in YYYY-MM-DD",\n  "brix": "average brix value as number or null",\n  "avgSize": "average diameter in mm or null",\n  "minSize": "min diameter mm or null",\n  "maxSize": "max diameter mm or null",\n  "totalDefectPct": "total defect % as number or null",\n  "minorDefectPct": "minor defects % as number or null",\n  "majorDefectPct": "major defects % as number or null",\n  "blemishScarringPct": "blemish/scarring/skin damage % or null",\n  "bruisingOilPct": "bruising/oil/rind breakdown % or null",\n  "softnessPct": "softness/puffiness % or null",\n  "colorationPct": "poor coloration/green % or null",\n  "heavyScarringCount": "count of heavy scarring if mentioned or null",\n  "palletsCount": "number of pallets or null",\n  "score": "client score or status e.g. GREEN, AMBER, RED, PASS, FAIL or null",\n  "decision": "A if accepted/pass/green, R if rejected/fail/red, null if unclear",\n  "temperature": "temperature reading if mentioned",\n  "notes": "key QC observations in one sentence"\n}'}
          ]}]
        })
      })
      .then(function(r){return r.json();})
      .then(function(data){
        var text=(data.content&&data.content[0]&&data.content[0].text)||'';
        try{
          var clean=text.replace(/```json|```/g,'').trim();
          var parsed=JSON.parse(clean);
          onDone(null,parsed,file.name);
        }catch(e){onDone('parse error: '+text.slice(0,100),null,file.name);}
      })
      .catch(function(e){onDone('API error: '+e.message,null,file.name);});
    };
    reader.readAsDataURL(file);
  }

  /* merge OCR results from multiple files into form */
  function applyOCRResult(parsed){
    if(parsed.container&&!fContainer) setContainer(parsed.container.toUpperCase());
    if(parsed.qcReportNumber&&!fQCRef) setQCRef(parsed.qcReportNumber);
    if(parsed.client&&!fClient) setClient(parsed.client);
    if(parsed.subClient&&!fSubClient) setSubClient(parsed.subClient);
    if(parsed.variety&&!fVar) setVar(parsed.variety);

    if(parsed.packhouse&&!fPH) setPH(parsed.packhouse);
    if(parsed.inspectionDate&&!fPackDate) setPackDate(parsed.inspectionDate);
    if(parsed.brix!=null&&!fBrix) setBrix(String(parsed.brix));
    if(parsed.totalDefectPct!=null&&!fTotalDef) setTotalDef(String(parsed.totalDefectPct));
    if(parsed.minorDefectPct!=null&&!fBlemish) setBlemish(String(parsed.minorDefectPct));
    if(parsed.bruisingOilPct!=null&&!fBruising) setBruising(String(parsed.bruisingOilPct));
    if(parsed.softnessPct!=null&&!fSoftness) setSoftness(String(parsed.softnessPct));
    if(parsed.colorationPct!=null&&!fColoration) setColoration(String(parsed.colorationPct));
    if(parsed.score&&!fScore) setScore(parsed.score);
    if(parsed.decision&&!fScore) setScore(parsed.decision==='A'?'GREEN':parsed.decision==='R'?'RED':'');
    if(parsed.temperature&&!fTempLogger) setTempLogger(parsed.temperature);
    if(parsed.notes&&!fGeneral) setGeneral(parsed.notes);
  }

  function runOCRAll(files){
    if(!files||!files.length) return;
    setOcrStatus('reading');
    setOcrLog([]);
    var results=[];
    var pending=files.length;
    files.forEach(function(file,i){
      ocrFile(file,i,files.length,function(err,parsed,name){
        if(err){
          results.push({name:name,status:'error',msg:err});
        } else {
          results.push({name:name,status:'ok',data:parsed});
          applyOCRResult(parsed);
        }
        pending--;
        setOcrLog(results.slice());
        if(pending===0) setOcrStatus('done');
      });
    });
  }

  function handleFiles(newFiles){
    var arr=Array.from(newFiles);
    /* Upload each file to Supabase Storage immediately */
    arr.forEach(function(file){
      var rid=editRep||'pending-'+Date.now();
      var safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      var path=rid+'/'+Date.now()+'-'+safeName;
      supabase.storage.from('client-qc-files').upload(path,file,{contentType:file.type,upsert:false})
        .then(function(res){
          if(res.error){console.error('[DalOS] File upload error:',res.error.message);return;}
          console.log('[DalOS] File uploaded:',path);
          /* Get signed URL valid for 1 year */
          supabase.storage.from('client-qc-files').createSignedUrl(path,31536000)
            .then(function(su){
              var url=su.data&&su.data.signedUrl;
              setUploadedFiles(function(prev){
                return prev.map(function(f){
                  return f.name===file.name&&!f.storagePath?Object.assign({},f,{storagePath:path,fileUrl:url}):f;
                });
              });
              /* If editing existing report, insert DB record immediately */
              if(editRep&&url){
                supabase.from('client_qc_files').insert([{
                  client_qc_report_id:editRep,
                  file_name:file.name,
                  file_url:url,
                  file_type:file.type
                }]).then(function(r){
                  if(r.error) console.error('[DalOS] client_qc_files insert error:',r.error.message);
                });
              }
            });
        });
    });
    setUploadedFiles(function(prev){return prev.concat(arr.map(function(f){return {name:f.name,size:f.size,type:f.type,file:f,storagePath:null,fileUrl:null};}));});
    runOCRAll(arr);
  }

          .eq('product_id',p.id).eq('season_id',config.activeSeasonId)
          .not('container_number','is',null)
          .range(from,from+999)
          .then(function(r){
            if(r.error) return;
            (r.data||[]).forEach(function(row){
              allKeys.add((row.container_number||'')+'||'+(row.carta||''));
            });
            if((r.data||[]).length===1000){
              fetchCountPage(from+1000);
            } else {
              setProdCounts(function(prev){return Object.assign({},prev,{[p.id]:allKeys.size});});
            }
          });
      }
      fetchCountPage(0);
    });
  },[]);

  /* Load shipments + grades + CQC matches */
  React.useEffect(function(){
    if(!selProd) return;
    setLoading(true);
    /* Supabase caps at 1000 rows per request — paginate to get all */
    var allRows=[];
    function fetchPage(from){
      var q=supabase.from('shipments').select('*').eq('product_id',selProd).order('loading_date',{ascending:false}).range(from,from+999);
      if(config.activeSeasonId) q=q.eq('season_id',config.activeSeasonId);
      q.then(function(res){
        if(res.error){console.error('[DalOS] Shipments load error:',res.error.message);setLoading(false);return;}
        allRows=allRows.concat(res.data||[]);
        if((res.data||[]).length===1000){
          /* More pages exist */
          fetchPage(from+1000);
        } else {
          /* Done — set state and load grades/CQC */
          setShipments(allRows);
          /* Load grades */
          var gq=supabase.from('shipment_container_grades').select('*').eq('product_id',selProd);
          if(config.activeSeasonId) gq=gq.eq('season_id',config.activeSeasonId);
          gq.then(function(gr){
            if(!gr.error) setGrades(gr.data||[]);
            /* Load CQC matches by container */
            var containers=[...new Set(allRows.map(function(s){return s.container_number;}).filter(Boolean))];
            if(containers.length===0){setLoading(false);return;}
            supabase.from('client_qc_reports').select('id,container_number').in('container_number',containers.slice(0,200))
              .then(function(cr){
                setLoading(false);
                if(cr.error) return;
                var map={};
                (cr.data||[]).forEach(function(r){map[r.container_number]=(map[r.container_number]||0)+1;});
                setCqcMatches(map);
              });
          });
        }
      });
    }
    fetchPage(0);
  },[selProd]);

  function getGrade(containerNum){
    return grades.find(function(g){return g.container_number===containerNum;})||null;
  }

  function openContainer(key, containerNum){
    /* key = container_number||carta for aggregated view, containerNum = actual container number for grade lookup */
    var cn=containerNum||key;
    setSelContainer(key||cn);
    setSelShip(null);
    var g=getGrade(cn);
    setGrade(g?g.grade||'':'');
    setGradeNote(g?g.grade_notes||'':'');
    setHasClaim(g?g.has_claim||false:false);
    setClaimNote(g?g.claim_notes||'':'');
    setClaimVal(g&&g.claim_value?String(g.claim_value):'');
    setClaimCur(g?g.claim_currency||'USD':'USD');
  }

  function openRow(s){
    openContainer(s.container_number, s.container_number);
    setSelShip(s);
  }

  function saveContainerGrade(){
    if(!selContainer) return;
    setSaving(true);
    /* selContainer may be "CONTAINER||CARTA" key or plain container_number */
    var realCN=selContainer.indexOf('||')>=0?selContainer.split('||')[0]:selContainer;
    var payload={
      container_number:realCN,
      product_id:selProd,
      season_id:config.activeSeasonId||null,
      grade:grade||null,
      grade_notes:gradeNote||null,
      has_claim:hasClaim,
      claim_notes:claimNote||null,
      claim_value:claimVal?parseFloat(claimVal):null,
      claim_currency:claimCur||'USD',
      updated_at:new Date().toISOString(),
    };
    supabase.from('shipment_container_grades').upsert(payload,{onConflict:'container_number,product_id,season_id'})
      .then(function(res){
        setSaving(false);
        if(res.error){console.error('[DalOS] Grade save error:',res.error.message);return;}
        setGrades(function(prev){
          var existing=prev.find(function(g){return g.container_number===realCN;});
          if(existing) return prev.map(function(g){return g.container_number===realCN?Object.assign({},g,payload):g;});
          return prev.concat([Object.assign({},payload,{id:Date.now()})]);
        });
      });
  }

  /* ── Hero product selector ── */
  if(!selProd){
    var prodList=(config.products||[]).filter(function(p){return p.active!==false;});
    var greeting=(function(){var h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';})();
    var firstName=currentUser.name?currentUser.name.split(' ')[0]:'';
    return ce('div',{className:'landing',style:{paddingTop:0}},
      ce('div',{style:{textAlign:'center',padding:'24px 24px 28px',borderBottom:'1px solid var(--border)',marginBottom:32}},
        ce('div',{style:{marginBottom:16}},
          ce('span',{style:{fontFamily:'var(--font-display)',fontSize:42,color:'var(--text)'}},'Dal'),
          ce('span',{style:{fontFamily:'var(--font-display)',fontSize:42,color:'var(--accent)'}},'OS'),
          ce('span',{style:{fontFamily:'var(--font-body)',fontSize:28,fontWeight:500,color:'var(--text2)',marginLeft:8}},'Vision')
        ),
        ce('div',{style:{fontSize:12,color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:20}},'Agricultural Quality Management'),
        firstName&&ce('div',{style:{fontSize:18,color:'var(--text2)',fontFamily:'var(--font-display)'}},'\uD83D\uDC4B '+greeting+', '+firstName)
      ),
      ce('div',{style:{maxWidth:680,margin:'0 auto',padding:'0 16px'}},
        ce('div',{style:{fontFamily:'var(--font-display)',fontSize:20,marginBottom:6,color:'var(--text)'}},'Shipments'),
        ce('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:20}},'Select a product to view shipment records, grades and claims.'),
        ce('div',{style:{display:'flex',flexDirection:'column',gap:14}},
          prodList.map(function(p){
            return ce('div',{key:p.id,onClick:function(){setSelProd(p.id);},
              style:{background:'var(--card)',border:'1px solid var(--border)',borderLeft:'5px solid '+(p.color||'var(--accent)'),borderRadius:12,padding:'20px 24px',cursor:'pointer',display:'flex',alignItems:'center',gap:24,transition:'box-shadow 0.15s,transform 0.15s'},
              onMouseOver:function(e){e.currentTarget.style.boxShadow='0 4px 18px rgba(0,0,0,0.10)';e.currentTarget.style.transform='translateX(3px)';},
              onMouseOut:function(e){e.currentTarget.style.boxShadow='';e.currentTarget.style.transform='';}
            },
              ce('div',{style:{display:'flex',alignItems:'center',gap:14,minWidth:180}},
                ce('div',{style:{width:42,height:42,borderRadius:10,background:p.color||'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
                  ce('span',{style:{color:'#fff',fontFamily:'var(--font-display)',fontSize:16,fontWeight:700}},(p.name||'').slice(0,2).toUpperCase())
                ),
                ce('div',null,
                  ce('div',{style:{fontFamily:'var(--font-display)',fontSize:17}},p.name||''),
                  ce('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},'Shipment records')
                )
              ),
              prodCounts[p.id]>0&&ce('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:2,marginLeft:8}},
                ce('div',{style:{fontSize:22,fontFamily:'var(--font-display)',color:p.color||'var(--accent)',fontWeight:700}},prodCounts[p.id]),
                ce('div',{style:{fontSize:10,color:'var(--text3)'}},prodCounts[p.id]===1?'voyage':'voyages')
              ),
              ce('div',{style:{color:'var(--text3)',fontSize:20,marginLeft:'auto',flexShrink:0}},'\u203a')
            );
          })
        )
      )
    );
  }

  /* ── Build aggregated container view ── */
  /* Key = container_number + carta to handle containers reused across voyages */
  var containerMap={};
  shipments.forEach(function(s){
    var cn=s.container_number||'(no container)';
    var carta=s.carta||'';
    var key=cn+'||'+carta;
    if(!containerMap[key]) containerMap[key]={
      container_number:cn,
      carta:carta,
      key:key,
      rows:[],
      clients:new Set(),
      varieties:new Set(),
      countries:new Set(),
      statuses:new Set(),
      total_cartons:0,
      total_net_weight:0,
      loading_dates:new Set(),
      etas:new Set(),
      invoice_nos:new Set(),
      cartas:new Set(),
    };
    var c=containerMap[key];
    c.rows.push(s);
    if(s.client) c.clients.add(s.client);
    if(s.variety) c.varieties.add(s.variety);
    if(s.receiving_country) c.countries.add(s.receiving_country);
    if(s.shipping_status) c.statuses.add(s.shipping_status);
    if(s.loading_date) c.loading_dates.add(s.loading_date);
    if(s.eta) c.etas.add(s.eta);
    if(s.invoice_no) c.invoice_nos.add(s.invoice_no);
    if(s.carta) c.cartas.add(s.carta);
    c.total_cartons+=(s.carton_count||0);
    c.total_net_weight+=(s.net_weight||0);
  });
  var containers=Object.values(containerMap);

  /* ── Filters ── */
  var statuses=Array.from(new Set(shipments.map(function(s){return s.shipping_status;}).filter(Boolean))).sort();
  var countries=Array.from(new Set(shipments.map(function(s){return s.receiving_country;}).filter(Boolean))).sort();

  function matchesFilters(s){
    if(statusFilter&&s.shipping_status!==statusFilter) return false;
    if(countryFilter.length>0&&!countryFilter.includes(s.receiving_country)) return false;
    if(search){
      var q=search.toLowerCase();
      return (s.container_number||'').toLowerCase().includes(q)||
             (s.client||'').toLowerCase().includes(q)||(s.vessel||'').toLowerCase().includes(q)||
             (s.carta||'').toLowerCase().includes(q)||(s.invoice_no||'').toLowerCase().includes(q)||
             (s.variety||'').toLowerCase().includes(q);
    }
    return true;
  }

  function containerMatchesFilters(c){
    if(statusFilter&&!c.statuses.has(statusFilter)) return false;
    if(countryFilter.length>0&&![...c.countries].some(function(cn){return countryFilter.includes(cn);})) return false;
    if(search){
      var q=search.toLowerCase();
      return c.container_number.toLowerCase().includes(q)||
             [...c.clients].some(function(x){return x.toLowerCase().includes(q);})||
             [...c.varieties].some(function(x){return x.toLowerCase().includes(q);})||
             [...c.invoice_nos].some(function(x){return x.toLowerCase().includes(q);})||
             [...c.cartas].some(function(x){return x.toLowerCase().includes(q);});
    }
    return true;
  }

  var filteredRows=shipments.filter(matchesFilters);
  var filteredContainers=containers.filter(containerMatchesFilters);

  var selProdObj=(config.products||[]).find(function(p){return p.id===selProd;})||{name:selProd,color:'var(--accent)'};
  var totalClaims=grades.filter(function(g){return g.has_claim;}).length;
  var totalGraded=grades.filter(function(g){return g.grade;}).length;

  function gradeColor(g){return g==='A'?'var(--green)':g==='B'?'var(--amber)':g==='C'?'var(--red)':'var(--text3)';}
  function gradeBg(g){return g==='A'?'var(--green-bg)':g==='B'?'var(--amber-bg)':g==='C'?'var(--red-bg)':'var(--bg2)';}

  /* ── Side panel content ── */
  function mkSidePanel(){
    if(!selContainer) return null;
    /* Extract real container_number from key (may be "CN||CARTA" or plain CN) */
    var realCN=selContainer.indexOf('||')>=0?selContainer.split('||')[0]:selContainer;
    var g=getGrade(realCN);
    var cqcCount=cqcMatches[realCN]||0;
    return ce('div',{style:{width:340,position:'fixed',top:50,right:0,bottom:0,zIndex:30,borderLeft:'1px solid var(--border)',overflowY:'auto',flexShrink:0,background:'var(--card)',boxShadow:'-4px 0 16px rgba(0,0,0,0.08)'}},
      ce('div',{style:{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:'var(--card)',zIndex:5}},
        ce('div',null,
          ce('div',{style:{fontWeight:600,fontSize:13,fontFamily:'var(--font-mono)'}},realCN),
          cqcCount>0&&ce('div',{style:{fontSize:11,color:'var(--green)',marginTop:2}},'\u2713 '+cqcCount+' CQC report'+(cqcCount>1?'s':'')+' matched')
        ),
        ce('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:18},onClick:function(){setSelContainer(null);setSelShip(null);}},'\u00d7')
      ),
      ce('div',{style:{padding:'14px 16px'}},
        /* Grade section */
        ce('div',{style:{background:grade?gradeBg(grade):'var(--bg2)',border:'1px solid '+(grade?'var(--border2)':'var(--border)'),borderRadius:8,padding:'12px 14px',marginBottom:12}},
          ce('div',{style:{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}},'Grade'),
          ce('div',{style:{display:'flex',gap:8,marginBottom:8}},
            ['','A','B','C'].map(function(g2){
              return ce('button',{key:g2||'none',
                style:{flex:1,padding:'8px 4px',borderRadius:6,border:'2px solid '+(grade===g2?(g2?gradeColor(g2):'var(--border2)'):'var(--border)'),
                  background:grade===g2?(g2?gradeBg(g2):'var(--bg2)'):'transparent',
                  color:grade===g2?(g2?gradeColor(g2):'var(--text3)'):'var(--text3)',
                  fontWeight:700,fontSize:14,cursor:'pointer'},
                onClick:function(){setGrade(g2);}
              },g2||'—');
            })
          ),
          ce('input',{className:'form-input',style:{fontSize:13,padding:'6px 10px'},placeholder:'Grade notes (optional)...',value:gradeNote,onChange:function(e){setGradeNote(e.target.value);}})
        ),
        /* Claim section */
        ce('div',{style:{background:hasClaim?'var(--red-bg)':'var(--bg2)',border:'1px solid '+(hasClaim?'var(--red-border)':'var(--border)'),borderRadius:8,padding:'12px 14px',marginBottom:12}},
          ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}},
            ce('div',{style:{fontWeight:600,fontSize:13,color:hasClaim?'var(--red)':'var(--text2)'}},(hasClaim?'\uD83D\uDEA9 Claim flagged':'Flag as claim')),
            ce('button',{style:{padding:'4px 12px',borderRadius:6,border:'1.5px solid '+(hasClaim?'var(--red)':'var(--border2)'),background:hasClaim?'var(--red)':'var(--card)',color:hasClaim?'#fff':'var(--text2)',fontSize:12,fontWeight:600,cursor:'pointer'},
              onClick:function(){setHasClaim(function(p){return !p;});}
            },hasClaim?'Remove':'+ Flag')
          ),
          hasClaim&&ce('div',null,
            ce('div',{style:{display:'flex',gap:6,marginBottom:8}},
              ce('select',{style:{width:70,padding:'6px 6px',border:'1px solid var(--border2)',borderRadius:6,fontSize:13,background:'var(--card)',flexShrink:0},value:claimCur,onChange:function(e){setClaimCur(e.target.value);}},
                ['USD','EUR','GBP','EGP'].map(function(c){return ce('option',{key:c,value:c},c);})
              ),
              ce('input',{style:{flex:1,padding:'6px 10px',border:'1px solid var(--border2)',borderRadius:6,fontSize:13,background:'var(--card)'},type:'number',step:'0.01',min:'0',placeholder:'Claim value (optional)',value:claimVal,onChange:function(e){setClaimVal(e.target.value);}})
            ),
            ce('textarea',{style:{width:'100%',padding:'8px 10px',border:'1px solid var(--border2)',borderRadius:6,fontSize:13,background:'var(--card)',resize:'vertical',minHeight:60},placeholder:'Claim notes...',value:claimNote,onChange:function(e){setClaimNote(e.target.value);}})
          )
        ),
        ce('button',{className:'btn btn-primary',style:{width:'100%',marginBottom:16},onClick:saveContainerGrade},saving?'Saving...':'Save grade & claim'),
        /* Container details — always shown */
        ce('div',null,
          ce('div',{style:{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}},'Container Details'),
          (function(){
            /* In aggregated mode use containerMap, in row mode use selShip */
            var c=containerMap[selContainer];
            var s=selShip;
            var pairs=[];
            if(c&&aggMode){
              pairs=[
                ['Container',realCN],
                ['Invoice(s)',[...c.invoice_nos].join(', ')||null],
                ['Carta',[...c.cartas].join(', ')||null],
                ['Varieties',[...c.varieties].join(', ')||null],
                ['Client',[...c.clients].join(', ')||null],

  }

  return ce('div',{style:{display:'flex',minHeight:'100%',position:'relative'}},
    ce('div',{style:{flex:1,minWidth:0,paddingRight:selContainer?340:0}},
      /* Frozen header — sticky relative to .main scroll */
      ce('div',{style:{position:'sticky',top:0,zIndex:20,background:'var(--bg)',borderBottom:'1px solid var(--border)',padding:'16px 16px 12px',marginBottom:0}},
      /* Topbar */
      ce('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}},
        ce('button',{className:'btn btn-secondary btn-sm',onClick:function(){setSelProd(null);setSelShip(null);setSelContainer(null);setSearch('');setStatusFilter('');setCountryFilter([]);}},'\u2190 Products'),

        ce('span',{style:{fontFamily:'var(--font-display)',fontSize:16}},selProdObj.name,' Shipments'),

        totalGraded>0&&ce('span',{className:'badge badge-pass',style:{fontSize:11}},totalGraded+' graded'),
        /* Toggle */
        ce('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'3px'}},
          ce('button',{style:{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:500,background:!aggMode?'var(--card)':'transparent',color:!aggMode?'var(--text)':'var(--text3)',border:'none',cursor:'pointer',boxShadow:!aggMode?'0 1px 3px rgba(0,0,0,.1)':'none'},onClick:function(){setAggMode(false);}},'All rows'),
          ce('button',{style:{padding:'5px 12px',borderRadius:6,fontSize:12,fontWeight:500,background:aggMode?'var(--card)':'transparent',color:aggMode?'var(--text)':'var(--text3)',border:'none',cursor:'pointer',boxShadow:aggMode?'0 1px 3px rgba(0,0,0,.1)':'none'},onClick:function(){setAggMode(true);}},'By container')
        )
      ),
      /* Filters */
      ce('div',{style:{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}},
        ce('input',{className:'form-input',style:{width:220,fontSize:13,padding:'6px 10px'},placeholder:'Search container, client, variety...',value:search,onChange:function(e){setSearch(e.target.value);}}),
        ce('select',{className:'form-select',style:{width:140,fontSize:13,padding:'6px 10px'},value:statusFilter,onChange:function(e){setStatusFilter(e.target.value);}},
          ce('option',{value:''},'All statuses'),
          statuses.map(function(s){return ce('option',{key:s,value:s},s);})
        ),
        /* Country multi-select as checkboxes in a dropdown */
        ce('div',{style:{position:'relative'}},
          ce('div',{style:{padding:'6px 10px',border:'1px solid var(--border2)',borderRadius:6,background:'var(--card)',fontSize:13,cursor:'pointer',userSelect:'none',minWidth:140,color:countryFilter.length>0?'var(--text)':'var(--text3)'},
            onClick:function(e){e.stopPropagation();var el=e.currentTarget.nextSibling;el.style.display=el.style.display==='block'?'none':'block';}},
            countryFilter.length===0?'All countries':countryFilter.length+' countr'+(countryFilter.length===1?'y':'ies')

            countries.map(function(c){
              var checked=countryFilter.includes(c);

                onClick:function(e){e.stopPropagation();}},

      ),

        ce('div',{className:'kpi',style:{flex:'1 1 100px',padding:'10px 14px'}},

        ),

          history.replaceState(null,'',window.location.pathname);

  function escalateBatch(id,note,byUser){
    updateBatch(id,{status:'Escalated',escalatedBy:byUser,escalatedAt:new Date().toLocaleString(),escalationNote:note});
    setSideAlerts(function(prev){
      if(prev.find(function(a){return a.id===id;})) return prev;
      return prev.concat([{id:id,msg:id+' \u2014 Escalated \u00b7 '+note.slice(0,40),batchId:id}]);
    });
    /* Save to DB */
    supabase.auth.getUser().then(function(ur){
      var uid=ur.data&&ur.data.user?ur.data.user.id:null;
      /* Update inspection status */
      supabase.from('inspections').update({status:'Escalated'}).eq('id',id).then(function(){});
      /* Insert escalation log */
      supabase.from('inspection_escalations').insert([{
        inspection_id:id,
        escalated_by:uid,
        escalation_note:note,
        round:1
      }]).then(function(r){
        if(r.error) console.error('[DalOS] Escalation save error:',r.error.message);
        else console.log('[DalOS] Escalation saved for',id);
      });
    });
  }
  function boardDecide(id,decision,comment,byUser){
    var newStatus=decision==='SA'?'Special Accept':'Special Reject';
    updateBatch(id,{decision:decision,status:newStatus,boardComment:comment,boardDecidedBy:byUser,boardDecidedAt:new Date().toLocaleString()});
    /* Save to DB */
    supabase.auth.getUser().then(function(ur){
      var uid=ur.data&&ur.data.user?ur.data.user.id:null;
      /* Update inspection */
      supabase.from('inspections').update({
        decision:decision,
        status:newStatus,
        decision_by:uid,
        decision_at:new Date().toISOString()
      }).eq('id',id).then(function(r){
        if(r.error) console.error('[DalOS] Board decision save error:',r.error.message);
        else console.log('[DalOS] Board decision saved for',id);
      });
      /* Resolve escalation log */
      supabase.from('inspection_escalations')
        .update({
          resolved_by:uid,
          resolved_at:new Date().toISOString(),
          resolution:decision==='SA'?'Special Accept':'Special Reject',
          resolution_comment:comment||null
        })
        .eq('inspection_id',id)
        .is('resolved_at',null)
        .then(function(r){
          if(r.error) console.error('[DalOS] Escalation resolve error:',r.error.message);
        });
    });
  }
